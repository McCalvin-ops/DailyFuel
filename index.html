<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Daily Fuel is a premium motivational quote generator for creators and everyday inspiration.">
  <title>Daily Fuel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="brand-wrap">
      <span class="brand-dot" aria-hidden="true"></span>
      <h1 class="brand-title">Daily Fuel</h1>
    </div>
    <button id="openFavoritesBtn" class="icon-button pressable" type="button" aria-label="Open favorites">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 21.35 10.55 20.03C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08A6.03 6.03 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35Z"></path>
      </svg>
      <span id="favoriteCountBadge" class="badge">0</span>
    </button>
  </header>

  <main class="app-main">
    <section class="categories" aria-label="Quote categories">
      <div id="categoryChips" class="category-chips"></div>
    </section>

    <section id="quoteCard" class="quote-card">
      <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
        <span class="loader"></span>
      </div>
      <p id="quoteText" class="quote-text">Fuel your day with purpose.</p>
      <div class="quote-meta">
        <p id="quoteAuthor" class="quote-author">Daily Fuel</p>
        <span id="quoteCategory" class="quote-category">Mindset</span>
      </div>
    </section>

    <section class="action-cluster">
      <div class="action-icons">
        <button id="saveBtn" class="icon-button pressable" type="button" aria-label="Save quote to favorites">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 21.35 10.55 20.03C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08A6.03 6.03 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35Z"></path>
          </svg>
        </button>
        <button id="shareBtn" class="icon-button pressable" type="button" aria-label="Share quote">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 16.08a3 3 0 0 0-2.27 1.03L8.91 13.7a3.02 3.02 0 0 0 0-3.39l6.76-3.34A3 3 0 1 0 15 5a2.8 2.8 0 0 0 .03.41L8.27 8.75a3 3 0 1 0 0 6.5l6.76 3.34a3 3 0 1 0 2.97-2.51Z"></path>
          </svg>
        </button>
        <button id="refreshBtn" class="icon-button pressable" type="button" aria-label="Generate new quote">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17.65 6.35A7.95 7.95 0 0 0 12 4V1L7 6l5 5V7a5 5 0 1 1-4.9 6h-2.02A7 7 0 1 0 17.65 6.35Z"></path>
          </svg>
        </button>
      </div>
      <button id="generateBtn" class="generate-button pressable" type="button">Generate Quote</button>
    </section>
  </main>

  <aside id="favoritesSheet" class="favorites-sheet" aria-hidden="true">
    <div class="sheet-header">
      <h2>Your Favorites</h2>
      <button id="closeFavoritesBtn" class="icon-button pressable" type="button" aria-label="Close favorites">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m18.3 5.7-1-1L12 10l-5.3-5.3-1 1L11 11l-5.3 5.3 1 1L12 12l5.3 5.3 1-1L13 11l5.3-5.3Z"></path>
        </svg>
      </button>
    </div>
    <div id="favoritesList" class="favorites-list"></div>
  </aside>
  <div id="sheetBackdrop" class="sheet-backdrop" hidden></div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
